<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <meta content="#1f2022" name="theme-color" />
  <title>IH | AMA</title>
  <meta content="Центробежные насосы из нержавеющей стали." name="description" />
  <link href="../images/brand/logo.png" rel="icon" type="image/png" />
  <link href="../images/brand/logo.png" rel="apple-touch-icon" />
  <script src="../js/core/theme-boot.js"></script>
  <script defer src="../js/core/theme.js"></script>
  <script defer src="../js/core/topbar.js"></script>
  <script defer src="../js/core/drawer.js"></script>
  <script defer src="../js/core/bubbles.js"></script>
  <script defer src="../js/data/ama-series.js"></script>
  <script defer src="../js/utils/request-form.js"></script>
  <script defer src="../js/pages/home.js"></script>
  <script defer src="../js/pages/series.js"></script>
  <script defer src="../js/pages/support.js"></script>
  <script defer src="../js/init.js"></script>
  <link href="../main.css" rel="stylesheet" />
</head>
<body class="page-series" data-hide-header-on-scroll data-series="IH">
  <header class="topbar">
    <div class="wrap wrap--narrow">
      <div class="nav">
        <a class="brand" href="../index.html">
          AMA
          <small>насосы нового поколения</small>
        </a>
        <div class="series-toolbar">
          <a class="btn" href="../pages/seriesPage.html">← К сериям</a>
          <button aria-label="Переключить тему" class="btn icon" data-theme-toggle id="themeBtn" title="Переключить тему" type="button">
            <span data-theme-icon>☾</span>
          </button>
          <a class="btn primary" href="#" id="mailBtn">Запрос</a>
        </div>
      </div>
    </div>
  </header>
  <div aria-hidden="true" class="topbarSpacer"></div>

  <main class="series-shell">
    <div class="wrap wrap--narrow">
      <section aria-labelledby="series-title" class="series-header">
        <h1 class="series-title" id="series-title">IH</h1>
        <p class="series-subtitle">Центробежные насосы из нержавеющей стали.</p>
        <div class="series-meta">Серия: <b>IH</b> · Группа: <b>Центробежные</b> · Материал / тип: <b>нерж. сталь</b></div>
      </section>

      <section aria-labelledby="materials-title" class="series-card">
        <div class="series-card-head">
          <div class="series-card-title" id="materials-title">Материалы</div>
          <div aria-label="Разделы серии" class="tabs" role="tablist">
            <button aria-controls="panel-desc" aria-selected="true" class="tab active" data-tab="desc" id="tab-desc" role="tab" type="button">Описание</button>
            <button aria-controls="panel-charts" aria-selected="false" class="tab" data-tab="charts" id="tab-charts" role="tab" type="button">Графики</button>
            <button aria-controls="panel-dims" aria-selected="false" class="tab" data-tab="dims" id="tab-dims" role="tab" type="button">Габаритка</button>
          </div>
        </div>
        <div aria-labelledby="tab-desc" class="tab-panel is-active" data-panel="desc" id="panel-desc" role="tabpanel">
          <div class="series-cover-wrap">
            <img alt="Насос серии IH — центробежный насос из нержавеющей стали" class="series-cover" src="../images/series-pages/ih.jpg" />
          </div>
        </div>
        <div aria-labelledby="tab-charts" class="tab-panel" data-panel="charts" hidden id="panel-charts" role="tabpanel">
          <div class="placeholder">Материалы для раздела «Графики» будут добавлены.</div>
        </div>
        <div aria-labelledby="tab-dims" class="tab-panel" data-panel="dims" hidden id="panel-dims" role="tabpanel">
          <div class="placeholder">Материалы для раздела «Габаритка» будут добавлены.</div>
        </div>
      </section>

      <footer class="series-footer">© 2026 AMA</footer>
    </div>
  </main>

  <button aria-label="Наверх" class="upBubble" id="upBubble" type="button">↑</button>
</body>
</html>
